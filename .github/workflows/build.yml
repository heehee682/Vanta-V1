name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.14'

    - name: Build Mod
      run: gradle build

    - name: Upload Mod JAR
      uses: actions/upload-artifact@v4
      with:
        name: CustomMod-26.1.2
        path: build/libs/*.jar
