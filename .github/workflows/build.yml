name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Download Forge 1.8.9 MDK
      run: wget https://maven.minecraftforge.net/net/minecraftforge/forge/1.8.9-11.15.1.2318-1.8.9/forge-1.8.9-11.15.1.2318-1.8.9-mdk.zip -O mdk.zip

    - name: Unzip MDK
      run: unzip mdk.zip -d mdk

    - name: Inject Mod Code
      run: |
        rm -rf mdk/src
        cp -r src mdk/src
        cp build.gradle mdk/build.gradle

    - name: Setup Gradle
      run: chmod +x mdk/gradlew

    - name: Build Mod
      run: cd mdk && ./gradlew build

    - name: Upload Mod JAR
      uses: actions/upload-artifact@v3
      with:
        name: CustomMod-1.8.9
        path: mdk/build/libs/*.jar
